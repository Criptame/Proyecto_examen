services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-eft_user}
      POSTGRES_PASSWORD: ${PGPASSWORD:-change_me}
      POSTGRES_DB: ${PGDATABASE:-eft_db}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-eft_user} -d ${PGDATABASE:-eft_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-eft_user}
      PGPASSWORD: ${PGPASSWORD:-change_me}
      PGDATABASE: ${PGDATABASE:-eft_db}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  db_data:
