name: CI/CD

# Requiere, en Settings > Secrets and variables > Actions del repo:
#   Secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY   (usuario IAM creado en infra/02-iam.sh)
#   Variables: AWS_REGION, ECR_BACKEND_REPO, ECR_FRONTEND_REPO,
#              ECS_CLUSTER, ECS_SERVICE_BACKEND, ECS_SERVICE_FRONTEND, ALB_DNS
# Ver infra/README.md para como se obtienen esos valores.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend - install & test
        working-directory: backend
        run: |
          npm install
          npm test

      - name: Frontend - install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (sin publicar)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: eft-devops-backend:ci

      - name: Build frontend image (sin publicar)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: eft-devops-frontend:ci

      - name: Escaneo de vulnerabilidades (Trivy) - backend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: eft-devops-backend:ci
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Escaneo de vulnerabilidades (Trivy) - frontend
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: eft-devops-frontend:ci
          severity: CRITICAL,HIGH
          exit-code: '0'

  push:
    name: Push a Amazon ECR
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.tags.outputs.backend-image }}
      frontend-image: ${{ steps.tags.outputs.frontend-image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login en Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Definir tags de imagen
        id: tags
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "backend-image=${REGISTRY}/${{ vars.ECR_BACKEND_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "frontend-image=${REGISTRY}/${{ vars.ECR_FRONTEND_REPO }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend-image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_BACKEND_REPO }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=http://${{ vars.ALB_DNS }}
          tags: |
            ${{ steps.tags.outputs.frontend-image }}
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_FRONTEND_REPO }}:latest

  deploy:
    name: Deploy a ECS Fargate
    needs: push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Render task definition - backend
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/task-def-backend.json
          container-name: backend
          image: ${{ needs.push.outputs.backend-image }}

      - name: Deploy backend a ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_BACKEND }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render task definition - frontend
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/task-def-frontend.json
          container-name: frontend
          image: ${{ needs.push.outputs.frontend-image }}

      - name: Deploy frontend a ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_FRONTEND }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: URL de la aplicacion desplegada
        run: echo "App disponible en http://${{ vars.ALB_DNS }}"
